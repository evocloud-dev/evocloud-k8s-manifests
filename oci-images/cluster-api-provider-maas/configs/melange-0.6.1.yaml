# Source: https://github.com/spectrocloud/cluster-api-provider-maas
# Reference: https://github.com/spectrocloud/cluster-api-provider-maas/blob/main/Makefile
# Schema: https://github.com/chainguard-dev/melange/blob/main/docs/BUILD-FILE.md

package:
  name: cluster-api-provider-maas
  version: 0.6.1
  epoch: 1
  description: "Cluster API Provider for MAAS"
  target-architecture:
    - x86_64
  copyright:
    - attestation: |
        Created by the EvoCloud Engineering Team.
        Copyright (C) 2026 EvoCloud, Inc.
      license: MPL-2.0
      paths:
        - "*"
  url: "https://github.com/spectrocloud/cluster-api-provider-maas"

environment:
  contents:
    repositories:
      - https://packages.wolfi.dev/os
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - ca-certificates-bundle

vars:
  git_commit: "6ec0c47f173da23fe1b4935a7823013a9eb0ff15"

pipeline:
  #https://github.com/chainguard-dev/melange/blob/main/pkg/build/pipelines/git-checkout.yaml
  - name: "DOWNLOADING CLUSTER-API-PROVIDER-MAAS SOURCE CODE"
    uses: git-checkout
    with:
      repository: https://github.com/spectrocloud/cluster-api-provider-maas
      expected-commit: ${{vars.git_commit}}
      tag: v${{package.version}}

  - name: "PATCHING GO MODULES"
    # secfixes:
    #   0.6.1-r1:
    #     - GHSA-6v2p-p543-phr9
    #     - GHSA-vvgc-356p-c3xw 
    #     - GHSA-qxp5-gwg8-xv66 
    runs: |
      go get golang.org/x/oauth2@v0.27.0
      go get golang.org/x/net@v0.38.0
      go mod tidy
      go mod vendor

  - name: "BUILD CLUSTER-API-PROVIDER-MAAS BINARY"
    uses: go/build
    with:
      modroot: .
      packages: . 
      ldflags: -s 
      output: cluster-api-provider-maas

  - uses: strip

update:
  enabled: true
  github:
    identifier: spectrocloud/cluster-api-provider-maas
    strip-prefix: v  