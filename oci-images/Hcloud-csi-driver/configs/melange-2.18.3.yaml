# Source: https://github.com/hetznercloud/csi-driver
# Reference: https://github.com/hetznercloud/csi-driver/blob/main/.goreleaser.yml
# Schema: https://github.com/chainguard-dev/melange/blob/main/docs/BUILD-FILE.md


package:
  name: hcloud-csi-driver
  version: 2.18.3
  epoch: 0
  description: "Kubernetes Container Storage Interface driver for Hetzner Cloud Volumes."
  target-architecture:
    - x86_64 #supported architectures: 386, amd64, arm/v6, arm/v7, arm64, ppc64le, s390x, x86_64, aarch64, and all that builds it for all of them
  copyright:
    - license: Apache-2.0
    - attestation: |
        Created by the EvoCloud Engineering Team. 
        Copyright (C) 2026 EvoCloud, Inc.
      license: MPL-2.0
      paths:
        - "*"
  url: "https://github.com/hetznercloud/csi-driver"

environment:
  contents:
    repositories:
      - https://packages.wolfi.dev/os
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - ca-certificates-bundle

vars:
  git_commit: "24d80904c300344229ece57aad6524a7ac68612c"

pipeline:
  #https://github.com/chainguard-dev/melange/blob/main/pkg/build/pipelines/git-checkout.yaml
  - name: "DOWNLOADING HCLOUD-CSI-DRIVER SOURCE CODE"
    uses: git-checkout
    with:
      repository: https://github.com/hetznercloud/csi-driver
      expected-commit: ${{vars.git_commit}}
      tag: v${{package.version}}


  - name: "BUILD HCLOUD-CSI-DRIVER  BINARY"
    uses: go/build
    with:
      modroot: .
      packages: ./cmd
      ldflags: -s 
      output: hcloud-csi-driver

  - uses: strip

update:
  enabled: true
  github:
    identifier: hetznercloud/csi-driver
    strip-prefix: v
