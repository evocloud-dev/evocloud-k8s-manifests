# Source: https://github.com/rancher/cis-operator
# Reference: https://github.com/rancher/cis-operator/blob/main/Makefile
# Schema: https://github.com/chainguard-dev/melange/blob/main/docs/BUILD-FILE.md


package:
  name: cis-operator
  version: 1.4.7
  epoch: 0
  description: "The cis-operator enables running CIS benchmark security scans on a Kubernetes cluster and generate compliance reports that can be downloaded."
  target-architecture:
    - x86_64 #supported architectures: 386, amd64, arm/v6, arm/v7, arm64, ppc64le, s390x, x86_64, aarch64, and all that builds it for all of them
  copyright:
    - license: Apache-2.0
    - attestation: |
        Created by the EvoCloud Engineering Team. 
        Copyright (C) 2026 EvoCloud, Inc.
      license: MPL-2.0
      paths:
        - "*"
  url: "https://github.com/rancher/cis-operator"

environment:
  contents:
    repositories:
      - https://packages.wolfi.dev/os
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - ca-certificates-bundle

vars:
  git_commit: "b58ebcc884d48074c6b5f9bd34c2691a80fbc134"
  build_date: "2026-01-22T08:56:40Z"

pipeline:
  #https://github.com/chainguard-dev/melange/blob/main/pkg/build/pipelines/git-checkout.yaml
  - name: "DOWNLOADING CIS-OPERATOR SOURCE CODE"
    uses: git-checkout
    with:
      repository: https://github.com/rancher/cis-operator
      expected-commit: ${{vars.git_commit}}
      tag: v${{package.version}}


  - name: "BUILD CIS-OPERATOR BINARY"
    uses: go/build
    with:
      modroot: .
      packages: .
      ldflags: |
        -s
        -X github.com/rancher/cis-operator.GitCommit=${{vars.git_commit}}
        -X github.com/rancher/cis-operator.Version=${{package.version}}
      output: cis-operator

  - uses: strip

update:
  enabled: true
  github:
    identifier: rancher/cis-operator
    strip-prefix: v
