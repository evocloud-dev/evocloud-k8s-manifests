# Source: https://github.com/runatlantis/atlantis
# Reference: https://github.com/runatlantis/atlantis/blob/main/.goreleaser.yml
# Schema: https://github.com/chainguard-dev/melange/blob/main/docs/BUILD-FILE.md


package:
  name: atlantis
  version: 0.39.0
  epoch: 0
  description: "Terraform Pull Request Automation."
  target-architecture:
    - x86_64 #supported architectures: 386, amd64, arm/v6, arm/v7, arm64, ppc64le, s390x, x86_64, aarch64, and all that builds it for all of them
  copyright:
    - license: Apache-2.0
    - attestation: |
        Created by the EvoCloud Engineering Team. 
        Copyright (C) 2026 EvoCloud, Inc.
      license: MPL-2.0
      paths:
        - "*"
  url: "https://github.com/runatlantis/atlantis"

environment:
  contents:
    repositories:
      - https://packages.wolfi.dev/os
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - ca-certificates-bundle

vars:
  git_commit: "1f6268f4aed059fd057f9bac41f966a3db264db9"
  build_date: "2026-01-28T08:26:56Z"

pipeline:
  #https://github.com/chainguard-dev/melange/blob/main/pkg/build/pipelines/git-checkout.yaml
  - name: "DOWNLOADING ATLANTIS SOURCE CODE"
    uses: git-checkout
    with:
      repository: https://github.com/runatlantis/atlantis
      expected-commit: ${{vars.git_commit}}
      tag: v${{package.version}}

  - name: "BUILD ATLANTIS BINARY"
    uses: go/build
    with:
      modroot: .
      packages: .
      ldflags: |
        -s 
        -X main.version=${{package.version}}
        -X main.commit=${{vars.git_commit}}
        -X main.date=${{vars.build_date}}
      output: atlantis

  - uses: strip

update:
  enabled: true
  github:
    identifier: runatlantis/atlantis
    strip-prefix: v
