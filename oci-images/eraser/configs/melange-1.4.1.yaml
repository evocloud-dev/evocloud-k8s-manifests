# Source: https://github.com/eraser-dev/eraser
# Reference: https://github.com/eraser-dev/eraser/blob/main/Makefile
# Schema: https://github.com/chainguard-dev/melange/blob/main/docs/BUILD-FILE.md


package:
  name: eraser
  version: 1.4.1
  epoch: 0
  description: "Cleaning up images from Kubernetes nodes"
  target-architecture:
    - x86_64 #supported architectures: 386, amd64, arm/v6, arm/v7, arm64, ppc64le, s390x, x86_64, aarch64, and all that builds it for all of them
  copyright:
    - license: Apache-2.0
    - attestation: |
        Created by the EvoCloud Engineering Team. 
        Copyright (C) 2026 EvoCloud, Inc.
      license: MPL-2.0
      paths:
        - "*"
  url: "https://github.com/eraser-dev/eraser"

environment:
  contents:
    repositories:
      - https://packages.wolfi.dev/os
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - ca-certificates-bundle

vars:
  git_commit: "a5e6a65be09a37bb449da24e9445dcdbc72d9cc8"
  build_date: "2026-02-04T11:07:15Z"
  git_major: "1"
  git_minor: "4"

pipeline:
  #https://github.com/chainguard-dev/melange/blob/main/pkg/build/pipelines/git-checkout.yaml
  - name: "DOWNLOADING ERASER SOURCE CODE"
    uses: git-checkout
    with:
      repository: https://github.com/eraser-dev/eraser
      expected-commit: ${{vars.git_commit}}
      tag: v${{package.version}}


  - name: "BUILD ERASER BINARY"
    uses: go/build
    with:
      modroot: .
      packages: .
      ldflags: |
        -s 
        -X github.com/eraser-dev/eraser/version.buildTime=${{vars.build_date}}
        -X github.com/eraser-dev/eraser/version.vcsCommit=${{vars.git_commit}}
        -X github.com/eraser-dev/eraser/version.vcsState=clean
        -X github.com/eraser-dev/eraser/version.BuildVersion=${{package.version}}
        -X github.com/eraser-dev/eraser/version.vcsMajor=${{vars.git_major}}
        -X github.com/eraser-dev/eraser/version.vcsMinor=${{vars.git_minor}}
      output: eraser

  - uses: strip

update:
  enabled: true
  github:
    identifier: eraser-dev/eraser
    strip-prefix: v
