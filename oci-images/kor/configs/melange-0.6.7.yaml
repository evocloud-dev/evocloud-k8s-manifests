# Source: https://github.com/yonahd/kor
# Reference: https://github.com/yonahd/kor/blob/main/.goreleaser.yml
# Schema: https://github.com/chainguard-dev/melange/blob/main/docs/BUILD-FILE.md


package:
  name: kor
  version: 0.6.7
  epoch: 0
  description: "A Golang Tool to discover unused Kubernetes Resources."
  target-architecture:
    - x86_64 #supported architectures: 386, amd64, arm/v6, arm/v7, arm64, ppc64le, s390x, x86_64, aarch64, and all that builds it for all of them
  copyright:
    - license: Apache-2.0
    - attestation: |
        Created by the EvoCloud Engineering Team. 
        Copyright (C) 2026 EvoCloud, Inc.
      license: MPL-2.0
      paths:
        - "*"
  url: "https://github.com/yonahd/kor"

environment:
  contents:
    repositories:
      - https://packages.wolfi.dev/os
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - ca-certificates-bundle

vars:
  git_commit: "cbd4f6b9b559599353cfb37c65b0878df25c2981"

pipeline:
  #https://github.com/chainguard-dev/melange/blob/main/pkg/build/pipelines/git-checkout.yaml
  - name: "DOWNLOADING KOR SOURCE CODE"
    uses: git-checkout
    with:
      repository: https://github.com/yonahd/kor
      expected-commit: ${{vars.git_commit}}
      tag: v${{package.version}}


  - name: "BUILD KOR BINARY"
    uses: go/build
    with:
      modroot: .
      packages: .
      ldflags: -s -X github.com/yonahd/kor/pkg/utils.Version=${{package.version}}
      output: kor

  - uses: strip

update:
  enabled: true
  github:
    identifier: yonahd/kor
    strip-prefix: v
