# Source: https://github.com/hetznercloud/hcloud-cloud-controller-manager
# Reference: https://github.com/hetznercloud/hcloud-cloud-controller-manager/blob/main/.goreleaser.yml
# Schema: https://github.com/chainguard-dev/melange/blob/main/docs/BUILD-FILE.md


package:
  name: hcloud-cloud-controller-manager
  version: 1.29.2
  epoch: 0
  description: "Kubernetes cloud-controller-manager for Hetzner Cloud"
  target-architecture:
    - x86_64 #supported architectures: 386, amd64, arm/v6, arm/v7, arm64, ppc64le, s390x, x86_64, aarch64, and all that builds it for all of them
  copyright:
    - license: Apache-2.0
    - attestation: |
        Created by the EvoCloud Engineering Team. 
        Copyright (C) 2026 EvoCloud, Inc.
      license: MPL-2.0
      paths:
        - "*"
  url: "https://github.com/hetznercloud/hcloud-cloud-controller-manager"

environment:
  contents:
    repositories:
      - https://packages.wolfi.dev/os
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - ca-certificates-bundle

vars:
  git_commit: "1ee540c137c8f84163096f537b188f25abf6d3a6"
  k8s_component-base: "0.35.0"

pipeline:
  #https://github.com/chainguard-dev/melange/blob/main/pkg/build/pipelines/git-checkout.yaml
  - name: "DOWNLOADING HCLOUD-CLOUD-CONTROLLER-MANAGER SOURCE CODE"
    uses: git-checkout
    with:
      repository: https://github.com/hetznercloud/hcloud-cloud-controller-manager
      expected-commit: ${{vars.git_commit}}
      tag: v${{package.version}}


  - name: "BUILD HCLOUD-CLOUD-CONTROLLER-MANAGER BINARY"
    uses: go/build
    with:
      modroot: .
      packages: .
      ldflags: 
        -s 
        -X github.com/hetznercloud/hcloud-cloud-controller-manager/hcloud.providerVersion=${{package.version}}
        -X k8s.io/component-base/version.gitVersion=v${{vars.k8s_component-base}}
      output: hcloud-cloud-controller-manager

  - uses: strip

update:
  enabled: true
  github:
    identifier: hetznercloud/hcloud-cloud-controller-manager
    strip-prefix: v
